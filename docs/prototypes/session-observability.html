<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bridle Session Observability Prototype</title>
<style>
:root {
  color-scheme: dark;
  --bg: #11151b;
  --panel: #171c24;
  --panel-2: #1d2430;
  --line: #303949;
  --ink: #e7ebf2;
  --muted: #98a3b3;
  --blue: #4d8dff;
  --green: #54d38a;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--ink); font: 14px/1.5 Inter, ui-sans-serif, system-ui, sans-serif; }
button { font: inherit; }
.app { display: grid; grid-template-rows: 58px minmax(0, 1fr); height: 100vh; }
header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--line); background: #151a21; }
.brand strong, .brand span { display: block; }
.brand span, .muted { color: var(--muted); font-size: 12px; }
.badge { padding: 4px 8px; border: 1px solid #315d44; border-radius: 6px; background: #173323; color: #a9ebc2; font-size: 12px; }
.shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); min-height: 0; }
aside { padding: 18px; border-right: 1px solid var(--line); background: #141920; overflow: auto; }
aside h2 { margin: 0 0 4px; font-size: 15px; }
.session { width: 100%; margin-top: 18px; padding: 12px; border: 1px solid var(--blue); border-radius: 7px; background: var(--panel-2); color: inherit; text-align: left; }
.session strong, .session span { display: block; overflow-wrap: anywhere; }
.session span { margin-top: 7px; color: var(--muted); font-size: 12px; }
.kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
.kpi { padding: 10px; border: 1px solid var(--line); border-radius: 7px; background: var(--panel); }
.kpi span, .kpi strong { display: block; }
.kpi span { color: var(--muted); font-size: 11px; }
.kpi strong { margin-top: 4px; font-size: 17px; }
main { overflow: auto; }
.content { max-width: 920px; margin: 0 auto; padding: 36px 30px 64px; }
.title { margin-bottom: 28px; }
.title h1 { margin: 0; font-size: 22px; }
.title p { margin: 6px 0 0; color: var(--muted); }
.user { max-width: 70%; margin: 0 0 18px auto; padding: 13px 15px; border: 1px solid #34475f; border-radius: 8px; background: #1b2735; }
.assistant { margin-bottom: 28px; }
.assistant-head { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; color: var(--muted); }
.assistant-head strong { color: var(--ink); }
.call { width: 100%; padding: 13px 15px; border: 1px solid var(--line); border-radius: 8px 8px 0 0; background: var(--panel-2); color: inherit; text-align: left; cursor: pointer; }
.call strong, .call span { display: block; }
.call span { margin-top: 4px; color: var(--muted); font-size: 12px; }
.answer { padding: 18px; border: 1px solid var(--line); border-top: 0; border-radius: 0 0 8px 8px; background: var(--panel); white-space: pre-wrap; }
.drawer { position: fixed; inset: 0 0 0 auto; width: min(620px, 92vw); padding: 20px; border-left: 1px solid var(--line); background: #20252d; box-shadow: -20px 0 60px #0008; transform: translateX(100%); transition: transform .18s ease; overflow: auto; }
.drawer.open { transform: translateX(0); }
.drawer-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.close { width: 34px; height: 34px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel-2); color: var(--ink); cursor: pointer; }
.meta { display: grid; grid-template-columns: 130px 1fr; gap: 8px 18px; margin: 22px 0; }
.meta dt { color: var(--muted); }
.meta dd { margin: 0; overflow-wrap: anywhere; }
.block { margin-top: 14px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
.block h3 { margin: 0; padding: 10px 12px; background: var(--panel-2); font-size: 13px; }
pre { margin: 0; padding: 14px; background: #131820; color: #dce6f4; white-space: pre-wrap; overflow-wrap: anywhere; font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; }
@media (max-width: 720px) { .app { height: auto; min-height: 100vh; } .shell { display: block; } aside { border-right: 0; border-bottom: 1px solid var(--line); } .user { max-width: 88%; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><strong>Bridle Recording</strong><span>Session observability prototype</span></div>
    <span class="badge">Synthetic data</span>
  </header>
  <div class="shell">
    <aside>
      <h2>会话</h2>
      <div class="muted" id="session-meta"></div>
      <button class="session"><strong id="session-id"></strong><span id="raw-root"></span></button>
      <div class="kpis" id="kpis"></div>
    </aside>
    <main><div class="content"><section class="title"><h1 id="title"></h1><p id="subtitle"></p></section><div id="turns"></div></div></main>
  </div>
</div>
<section class="drawer" id="drawer">
  <div class="drawer-head"><h2>LLMCall 详情</h2><button class="close" id="close" aria-label="关闭">×</button></div>
  <dl class="meta" id="detail-meta"></dl>
  <section class="block"><h3>Prompt</h3><pre id="detail-prompt"></pre></section>
  <section class="block"><h3>Response</h3><pre id="detail-response"></pre></section>
  <section class="block"><h3>Raw files</h3><pre id="detail-files"></pre></section>
</section>
<script id="recording-data" type="application/json">
{
  "manifest": {
    "session_id": "session-demo-001",
    "created_at": "2030-01-15T09:30:00.000Z",
    "updated_at": "2030-01-15T09:30:02.480Z",
    "request_count": 1,
    "recorder": {
      "version": "0.1.0",
      "profile": "demo-http",
      "session_header": "x-demo-session-id",
      "upstream_base_url": "https://api.example.invalid/v1"
    }
  },
  "raw_root": "recordings/session-demo-001",
  "turns": [
    {
      "id": "turn-demo-001",
      "user": "Summarize the synthetic release notes.",
      "assistant": "The synthetic release adds deterministic fixtures and clearer diagnostics.",
      "calls": [
        {
          "index": "000000",
          "request_id": "resp_demo_001",
          "started_at": "2030-01-15T09:30:00.000Z",
          "duration_ms": 2480,
          "method": "POST",
          "path": "/responses",
          "status": 200,
          "model": "demo-model",
          "input_count": 2,
          "tools_count": 1,
          "usage": {"input_tokens": 120, "output_tokens": 34, "total_tokens": 154},
          "prompt": "Developer: Answer from the supplied synthetic fixture.\nUser: Summarize the synthetic release notes.",
          "output": "The synthetic release adds deterministic fixtures and clearer diagnostics.",
          "files": ["request_meta.json", "request_headers.json", "request_body.raw", "response_headers.json", "response_sse.raw", "response_meta.json"]
        }
      ]
    }
  ]
}
</script>
<script>
const data = JSON.parse(document.getElementById('recording-data').textContent);
const calls = data.turns.flatMap(turn => turn.calls);
const escapeHtml = value => String(value ?? '')
  .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
  .replaceAll('"', '&quot;').replaceAll("'", '&#039;');
document.getElementById('session-meta').textContent = `${data.manifest.recorder.profile} · ${data.manifest.request_count} request`;
document.getElementById('session-id').textContent = data.manifest.session_id;
document.getElementById('raw-root').textContent = data.raw_root;
document.getElementById('title').textContent = `${data.manifest.session_id} · Synthetic Session`;
document.getElementById('subtitle').textContent = `${data.manifest.created_at} → ${data.manifest.updated_at}`;
const totalTokens = calls.reduce((sum, call) => sum + call.usage.total_tokens, 0);
document.getElementById('kpis').innerHTML = [
  ['Turns', data.turns.length], ['LLM calls', calls.length], ['Tool defs', calls.reduce((sum, call) => sum + call.tools_count, 0)], ['Tokens', totalTokens]
].map(([label, value]) => `<div class="kpi"><span>${label}</span><strong>${value}</strong></div>`).join('');
document.getElementById('turns').innerHTML = data.turns.map(turn => `
  <section>
    <div class="user">${escapeHtml(turn.user)}</div>
    <div class="assistant">
      <div class="assistant-head"><strong>Demo Agent</strong><span>${turn.calls.length} LLM call</span></div>
      ${turn.calls.map(call => `<button class="call" data-call="${call.request_id}"><strong>LLMCall #${call.index} · ${call.model}</strong><span>${call.method} ${call.path} · ${call.duration_ms} ms · ${call.usage.total_tokens} tokens</span></button>`).join('')}
      <div class="answer">${escapeHtml(turn.assistant)}</div>
    </div>
  </section>`).join('');
function openDrawer(call) {
  document.getElementById('detail-meta').innerHTML = [
    ['Request ID', call.request_id], ['Status', call.status], ['Model', call.model], ['Latency', `${call.duration_ms} ms`], ['Input tokens', call.usage.input_tokens], ['Output tokens', call.usage.output_tokens]
  ].map(([label, value]) => `<dt>${label}</dt><dd>${escapeHtml(value)}</dd>`).join('');
  document.getElementById('detail-prompt').textContent = call.prompt;
  document.getElementById('detail-response').textContent = call.output;
  document.getElementById('detail-files').textContent = call.files.join('\n');
  document.getElementById('drawer').classList.add('open');
}
document.addEventListener('click', event => {
  const button = event.target.closest('[data-call]');
  if (button) openDrawer(calls.find(call => call.request_id === button.dataset.call));
});
document.getElementById('close').addEventListener('click', () => document.getElementById('drawer').classList.remove('open'));
</script>
</body>
</html>
