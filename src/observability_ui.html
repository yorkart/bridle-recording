<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bridle Recording Observability</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{color-scheme:dark;--bg:#14171d;--panel:#1b2028;--panel2:#222833;--ink:#e7eaf0;--muted:#9aa3b2;--faint:#697283;--line:#303846;--blue:#3b82f6;--green:#39d98a;--amber:#f0b84f;--red:#f87171;--code:#111720}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}.app{display:grid;grid-template-rows:58px minmax(0,1fr);height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 18px;border-bottom:1px solid #252b35;background:#171b22}.brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{display:grid;place-items:center;width:30px;height:30px;border:1px solid #465165;border-radius:6px;background:#202631}.brand strong,.brand span{display:block}.brand span{font-size:12px;color:var(--muted)}.logo svg,.btn svg,.icon-btn svg,.call-card svg,.tool-row svg{width:16px;height:16px}.search{position:relative;width:min(380px,34vw)}.search svg{position:absolute;left:10px;top:9px;color:var(--faint);width:16px}.search input{width:100%;height:34px;padding:0 12px 0 34px;border:1px solid var(--line);border-radius:8px;background:#11151b;color:var(--ink)}.top-actions{display:flex;gap:8px}.btn,.icon-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:34px;border:1px solid var(--line);border-radius:7px;background:#202632;color:var(--ink);cursor:pointer;text-decoration:none}.btn{padding:0 11px}.icon-btn{width:34px}.btn.primary{border-color:#2f69d9;background:#2563eb;color:#fff}.btn:disabled{opacity:.5;cursor:not-allowed}
.shell{display:grid;grid-template-columns:280px minmax(0,1fr) 246px;height:100%;min-height:0}.sidebar,.chat,.outline{min-height:0;overflow:auto}.sidebar{border-right:1px solid var(--line);background:#151920}.side-head,.outline-head{padding:14px;border-bottom:1px solid var(--line)}.side-head h1,.outline-head h2{margin:0;font-size:14px}.side-head p,.outline-head p{margin:4px 0 0;color:var(--muted);font-size:12px}.profile-select{padding:10px 14px;border-bottom:1px solid var(--line)}.profile-select select{width:100%;height:32px;border:1px solid var(--line);border-radius:8px;background:#11151b;color:var(--ink);padding:0 8px}.session-card{display:grid;gap:8px;margin:10px;padding:10px;border:1px solid #344255;border-radius:8px;background:#202733;text-align:left;color:inherit;cursor:pointer;width:calc(100% - 20px)}.session-card.active{border-color:#2f69d9;box-shadow:0 0 0 1px #2f69d9 inset}.session-card strong,.session-card span{overflow-wrap:anywhere}.session-card span{font-size:12px;color:var(--muted)}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}.kpi{padding:10px;border:1px solid var(--line);border-radius:8px;background:#171d25}.kpi span{display:block;color:var(--muted);font-size:11px}.kpi strong{display:block;margin-top:5px;font-size:16px}
.chat{background:radial-gradient(circle at top,rgba(59,130,246,.05),transparent 32%),#151920}.chat-inner{max-width:980px;margin:0 auto;padding:28px 28px 52px}.session-title{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px}.session-title h1{margin:0;font-size:18px}.session-title p{margin:5px 0 0;color:var(--muted);overflow-wrap:anywhere}.bubble-row{display:flex;margin:18px 0}.bubble-row.user{justify-content:flex-end}.avatar{display:grid;place-items:center;flex:0 0 auto;width:30px;height:30px;margin:2px 10px 0 0;border:1px solid var(--line);border-radius:50%;background:#222a36}.bubble{max-width:min(720px,82%);border:1px solid var(--line);border-radius:8px;background:#1b222d;padding:14px 16px;white-space:pre-wrap}.user .bubble{background:#1c2633;border-color:#33445c}.turn{margin:22px 0 34px}.assistant-head{display:flex;align-items:center;gap:9px;margin-bottom:9px;color:var(--muted)}.assistant-head strong{color:var(--ink)}.tag,.protocol{display:inline-flex;align-items:center;height:22px;padding:0 7px;border-radius:6px;background:#68451e;color:#ffd394;font-weight:700;font-size:12px}.protocol{background:#233754;color:#b9d4ff}.protocol.websocket{background:#3c2857;color:#dfc7ff}.turn-panel{border:1px solid var(--line);border-radius:8px;background:#1a2029;overflow:hidden}.call-card{width:100%;display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:10px;align-items:center;padding:11px 13px;border:0;border-bottom:1px solid var(--line);background:#202733;color:inherit;text-align:left;cursor:pointer}.call-card:hover,.tool-row:hover{background:#26303d}.call-main{min-width:0}.call-main strong,.call-main span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.call-main span{margin-top:3px;color:var(--muted);font-size:12px}.metrics{display:flex;gap:10px;color:var(--muted);font-size:12px;white-space:nowrap}.answer{padding:18px 22px;white-space:pre-wrap;color:#dbe3ee;font-size:15px}.tool-row{width:calc(100% - 32px);display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:10px;align-items:center;margin:10px 16px;padding:10px 12px;border:1px solid #394456;border-radius:8px;background:#202733;color:inherit;text-align:left;cursor:pointer}.tool-row strong,.tool-row span{display:block}.tool-row span{color:var(--muted);font-size:12px}.tool-output{margin:10px 16px 16px;padding:12px 14px;border:1px solid #2f4d38;border-radius:8px;background:#15271e;color:#ccebd8;white-space:pre-wrap;overflow:auto}.divider{display:flex;align-items:center;gap:12px;margin:16px;color:var(--faint);font-size:12px}.divider:before,.divider:after{content:"";height:1px;background:var(--line);flex:1}.outline{border-left:1px solid var(--line);background:#151920}.outline-list{padding:10px}.outline-item{display:block;width:100%;padding:9px 10px;border:0;border-left:2px solid transparent;background:transparent;color:var(--muted);text-align:left;cursor:pointer}.outline-item.active{border-left-color:var(--green);background:#1d2430;color:var(--ink)}
.drawer-backdrop,.trim-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:20}.drawer-backdrop.open,.trim-backdrop.open{display:block}.drawer{position:fixed;right:0;top:0;width:min(66vw,1180px);min-width:760px;height:100vh;background:#20252d;border-left:1px solid var(--line);transform:translateX(100%);transition:transform .18s ease;z-index:21;overflow:auto}.drawer.open{transform:translateX(0)}.drawer-head{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);background:#20252d}.drawer-title,.drawer-actions{display:flex;align-items:center;gap:9px}.basic{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;background:var(--line);border-bottom:1px solid var(--line)}.field{padding:11px 13px;background:#1c2128}.field span,.field strong{display:block;overflow-wrap:anywhere}.field span{color:var(--muted);font-size:11px}.field strong{margin-top:4px;font-size:12px}.tabs{position:sticky;top:63px;z-index:2;display:flex;overflow:auto;border-bottom:1px solid var(--line);background:#20252d}.tab{padding:11px 14px;border:0;border-bottom:2px solid transparent;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}.tab.active{border-bottom-color:var(--blue);color:var(--ink)}.drawer-body{padding:16px 18px 40px}.prompt-block,.detail-block,.event-card,.frame-card{margin-bottom:12px;border:1px solid var(--line);border-radius:8px;overflow:hidden}.prompt-head,.detail-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;background:#252c36;color:var(--muted);font-size:12px}.prompt-block{--prompt-border:var(--line);--prompt-head:#252c36;--prompt-body:var(--code);--prompt-hover:#17202b;--prompt-accent:#8bb7ff;border-color:var(--prompt-border)}.prompt-block.role-system{--prompt-border:#3a5f99;--prompt-head:#253652;--prompt-body:#151e2e;--prompt-hover:#1b2940;--prompt-accent:#82b4ff}.prompt-block.role-developer{--prompt-border:#68518b;--prompt-head:#392d4c;--prompt-body:#211a2a;--prompt-hover:#2b2237;--prompt-accent:#c3a5ed}.prompt-block.role-user{--prompt-border:#376d52;--prompt-head:#233f32;--prompt-body:#15251d;--prompt-hover:#1b3025;--prompt-accent:#76d39e}.prompt-block.role-assistant{--prompt-border:#7a6035;--prompt-head:#473923;--prompt-body:#292115;--prompt-hover:#352a1b;--prompt-accent:#f0bd66}.prompt-block .prompt-head{background:var(--prompt-head)}.prompt-block>.code{background:var(--prompt-body)}.prompt-toggle{display:flex;align-items:center;gap:6px;width:100%;padding:8px 14px 10px;border:0;border-top:1px solid var(--prompt-border);background:var(--prompt-body);color:var(--prompt-accent);text-align:left;cursor:pointer}.prompt-toggle:hover{background:var(--prompt-hover)}.prompt-toggle svg{width:14px;height:14px}.code{margin:0;padding:14px;background:var(--code);color:#dce6f4;white-space:pre-wrap;overflow-wrap:anywhere;overflow:auto;font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.json-key{color:#9cdcfe}.json-string{color:#ce9178}.json-bool,.json-number{color:#b5cea8}.json-null{color:#c586c0}.file-list{border:1px solid var(--line);border-radius:8px;overflow:hidden}.file-row{display:flex;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--line)}.file-row:last-child{border:0}.timeline{position:relative;margin-left:7px;padding-left:22px;border-left:1px solid #465268}.timeline-row{position:relative;margin:0 0 18px}.timeline-row:before{content:"";position:absolute;left:-28px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 4px #20252d}.timeline-row strong,.timeline-row span{display:block}.timeline-row span{color:var(--muted);font-size:12px}.event-card,.frame-card{padding:12px;background:#191f27}.event-card summary,.frame-card summary{cursor:pointer;font-weight:700}.event-meta{margin:5px 0 10px;color:var(--muted);font-size:12px}.tool-section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:18px 0 10px;color:var(--muted);font-size:12px}.tool-section-head:first-child{margin-top:0}.tool-view-toggle{display:inline-flex;padding:2px;border:1px solid var(--line);border-radius:7px;background:#181d25}.tool-view-toggle button{padding:5px 9px;border:0;border-radius:5px;background:transparent;color:var(--muted);cursor:pointer;font-size:12px}.tool-view-toggle button.active{background:#27446e;color:#cfe1ff}.tool-definition{margin-bottom:8px;border:1px solid #3a4555;border-radius:8px;background:#1b212a;overflow:hidden}.tool-definition summary{display:grid;grid-template-columns:auto minmax(0,1fr) auto auto;gap:10px;align-items:center;padding:11px 12px;cursor:pointer;list-style:none;background:#242b35}.tool-definition summary::-webkit-details-marker{display:none}.tool-definition summary:hover{background:#29333f}.tool-definition summary>svg{width:16px;height:16px;color:var(--muted)}.tool-definition .tool-chevron{transition:transform .15s ease}.tool-definition[open] .tool-chevron{transform:rotate(90deg)}.tool-definition-main{min-width:0}.tool-definition-main strong,.tool-definition-main span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tool-definition-main span{margin-top:2px;color:var(--muted);font-size:12px}.tool-type{display:inline-flex;align-items:center;height:22px;padding:0 7px;border-radius:5px;background:#263e62;color:#aecdff;font-size:11px}.tool-definition-body{border-top:1px solid var(--line)}.tool-definition-description{margin:0;padding:12px 14px;color:var(--muted);white-space:pre-wrap}.tool-definition-body h4{margin:0;padding:10px 14px;background:#1d232c;color:var(--muted);font-size:12px}.warning,.error{padding:12px;border:1px solid #684040;border-radius:7px;background:#321e21;color:#fecaca}.empty{padding:24px;text-align:center;color:var(--muted)}
.trim-modal{position:fixed;inset:5vh 5vw;z-index:31;display:none;grid-template-rows:auto minmax(0,1fr) auto;border:1px solid #465165;border-radius:10px;background:#1b2028;box-shadow:0 24px 90px #000b;overflow:hidden}.trim-modal.open{display:grid}.trim-head,.trim-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line)}.trim-head h2{margin:0;font-size:16px}.trim-head p{margin:3px 0 0;color:var(--muted);font-size:12px}.trim-foot{border-top:1px solid var(--line);border-bottom:0}.trim-body{display:grid;grid-template-columns:minmax(340px,.85fr) minmax(440px,1.15fr);min-height:0}.trim-column{padding:16px;overflow:auto}.trim-column+ .trim-column{border-left:1px solid var(--line)}.trim-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.request-choice{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:10px;align-items:center;margin-bottom:8px;padding:10px;border:1px solid var(--line);border-radius:7px;background:#202733}.request-choice strong,.request-choice span{display:block}.request-choice span{color:var(--muted);font-size:12px}.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}.option{display:flex;align-items:flex-start;gap:8px;padding:10px;border:1px solid var(--line);border-radius:7px;background:#202733}.option small{display:block;color:var(--muted)}.sensitive{width:100%;min-height:76px;margin:7px 0 14px;padding:9px;border:1px solid var(--line);border-radius:7px;background:#111720;color:var(--ink);resize:vertical}.preview{margin-top:14px}.preview-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}.preview-summary div{padding:10px;border:1px solid var(--line);border-radius:7px;background:#171d25}.preview-summary span,.preview-summary strong{display:block}.preview-summary span{color:var(--muted);font-size:11px}.preview-request{margin-bottom:10px;border:1px solid var(--line);border-radius:8px;overflow:hidden}.preview-request summary{padding:10px;background:#252c36;cursor:pointer}.foot-note{color:var(--muted);font-size:12px}
@media(max-width:1000px){.shell{grid-template-columns:240px minmax(0,1fr)}.outline{display:none}.drawer{width:92vw;min-width:0}.trim-modal{inset:2vh 2vw}.trim-body{grid-template-columns:1fr}.trim-column+ .trim-column{border-left:0;border-top:1px solid var(--line)}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="logo"><i data-lucide="bot"></i></div><div><strong>Bridle Recording</strong><span>HTTP · SSE · WebSocket</span></div></div>
    <div class="search"><i data-lucide="search"></i><input id="search" placeholder="搜索 turn、tool、request id" /></div>
    <div class="top-actions"><a class="btn" href="/health"><i data-lucide="activity"></i><span>Health</span></a><button class="btn primary" id="trimMode"><i data-lucide="scissors"></i><span>剪裁模式</span></button></div>
  </header>
  <div class="shell">
    <aside class="sidebar"><div class="side-head"><h1>会话</h1><p id="sessionMeta">loading</p></div><div class="profile-select"><select id="profileSelect"></select></div><div id="sessionList"></div><div class="kpis" id="kpis"></div></aside>
    <main class="chat"><div class="chat-inner"><section class="session-title"><div><h1 id="title">Loading</h1><p id="subtitle"></p></div><button class="btn" id="saveTestset"><i data-lucide="git-branch"></i><span>剪裁并导出</span></button></section><div id="chatFlow"></div></div></main>
    <aside class="outline"><div class="outline-head"><h2>Turn Outline</h2><p>click to jump</p></div><div class="outline-list" id="outline"></div></aside>
  </div>
</div>
<div class="drawer-backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head"><div class="drawer-title"><strong id="drawerTitle">请求详情</strong><span class="tag" id="drawerKind">call</span></div><div class="drawer-actions"><button class="icon-btn" id="closeDrawer" title="关闭"><i data-lucide="x"></i></button></div></div>
  <div class="basic" id="basic"></div><div class="tabs" id="tabs"></div><div class="drawer-body" id="drawerBody"></div>
</aside>
<div class="trim-backdrop" id="trimBackdrop"></div>
<section class="trim-modal" id="trimModal">
  <div class="trim-head"><div><h2>剪裁测试集</h2><p>所有操作只作用于导出副本，原始 recording 保持不变。</p></div><button class="icon-btn" id="closeTrim"><i data-lucide="x"></i></button></div>
  <div class="trim-body">
    <div class="trim-column"><div class="trim-toolbar"><strong>保留请求 / 响应序列</strong><label><input type="checkbox" id="selectAll" checked /> 全选</label></div><div id="trimRequests"></div></div>
    <div class="trim-column">
      <strong>离线处理</strong>
      <div class="options">
        <label class="option"><input type="checkbox" id="redactHeaders" checked /><span>敏感 Header<small>非白名单值替换为 ******</small></span></label>
        <label class="option"><input type="checkbox" data-remove="tools" /><span>移除 Tools<small>定义、调用及返回</small></span></label>
        <label class="option"><input type="checkbox" data-remove="skills" /><span>移除 Skills<small>skills prompt 片段</small></span></label>
        <label class="option"><input type="checkbox" data-remove="apps" /><span>移除 Apps<small>apps prompt 片段</small></span></label>
        <label class="option"><input type="checkbox" data-remove="plugins" /><span>移除 Plugins<small>plugins / recommended plugins</small></span></label>
        <label class="option"><input type="checkbox" data-remove="derived_prompt" /><span>移除派生 Prompt<small>environment / permissions</small></span></label>
      </div>
      <label for="sensitiveValues"><strong>敏感内容</strong><small class="foot-note">每行一个完整值；请求、响应、SSE 与 WebSocket 导出副本中统一替换为 ******。</small></label>
      <textarea class="sensitive" id="sensitiveValues" placeholder="Bearer token 或其他敏感原文，每行一个"></textarea>
      <button class="btn" id="previewTrim"><i data-lucide="eye"></i><span>生成预览</span></button>
      <div class="preview" id="trimPreview"><div class="empty">选择序列和处理选项后生成预览。</div></div>
    </div>
  </div>
  <div class="trim-foot"><span class="foot-note">导出请求会按所选顺序重新编号为连续序列。</span><div class="top-actions"><button class="btn" id="cancelTrim">取消</button><button class="btn primary" id="exportTrim"><i data-lucide="download"></i><span>导出确认内容</span></button></div></div>
</section>
<script>
let DATA=null;
const state={profile:null,session:null,selectedTurn:0,selectedCallId:null,tab:'timeline',expandedPrompts:new Set(),toolDefinitionsView:'formatted',lastPreview:null};
const qs=new URLSearchParams(location.hash.replace(/^#/,''));
const esc=value=>String(value??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
const syntaxJson=value=>esc(typeof value==='string'?value:JSON.stringify(value,null,2)).replace(/(&quot;(?:\\.|[^&])*?&quot;)(\s*:)?|\b(true|false)\b|\bnull\b|-?\b\d+(?:\.\d+)?(?:e[+-]?\d+)?\b/gi,(match,string,key,bool)=>string?`<span class="${key?'json-key':'json-string'}">${string}</span>${key||''}`:bool?`<span class="json-bool">${bool}</span>`:match==='null'?'<span class="json-null">null</span>':`<span class="json-number">${match}</span>`);
const fmtMs=ms=>ms==null?'n/a':ms>=1000?(ms/1000).toFixed(2)+' s':ms+' ms';
const fmtNum=value=>value==null?'0':Number(value).toLocaleString();
const iconize=()=>window.lucide&&window.lucide.createIcons();
const allCalls=()=>DATA?.requests||[];
const callById=id=>allCalls().find(call=>call.request_id===id||call.index===id);
async function api(path,options){const response=await fetch(path,options);const body=await response.json().catch(()=>({detail:'request failed'}));if(!response.ok){const error=new Error(body.detail||body.error||'request failed');error.status=response.status;error.body=body;throw error}return body}
async function boot(){try{const profiles=await api('/api/profiles');const profile=qs.get('profile')||profiles.profiles[0];state.profile=profile;document.getElementById('profileSelect').innerHTML=profiles.profiles.map(item=>`<option ${item===profile?'selected':''}>${esc(item)}</option>`).join('');const sessions=await api(`/api/profiles/${encodeURIComponent(profile)}/sessions`);const session=qs.get('session')||sessions.sessions[0]?.session_id;renderSessionList(sessions.sessions,session);if(session)await loadSession(profile,session);else showError(`No recordings found for profile ${profile}`)}catch(error){showError(error.message)}iconize()}
async function loadSession(profile,session){state.profile=profile;state.session=session;setActiveSession(session);DATA=await api(`/api/profiles/${encodeURIComponent(profile)}/sessions/${encodeURIComponent(session)}`);location.hash=`profile=${encodeURIComponent(profile)}&session=${encodeURIComponent(session)}`;renderShell();iconize()}
function showError(text){document.getElementById('chatFlow').innerHTML=`<div class="error">${esc(text)}</div>`}
function renderSessionList(sessions,active){document.getElementById('sessionMeta').textContent=`${state.profile||''} · ${sessions.length} sessions`;document.getElementById('sessionList').innerHTML=sessions.map(session=>`<button class="session-card ${session.session_id===active?'active':''}" data-session="${esc(session.session_id)}"><strong>${esc(session.session_id)}</strong><span>${esc(session.updated_at||session.created_at)} · ${session.request_count} requests</span></button>`).join('')}
function setActiveSession(session){document.querySelectorAll('.session-card').forEach(card=>card.classList.toggle('active',card.dataset.session===session))}
function renderShell(){document.getElementById('sessionMeta').textContent=`${DATA.profile} · ${allCalls().length} requests`;document.getElementById('title').textContent=`${DATA.session_id.slice(0,8)} · Recorded Session`;document.getElementById('subtitle').textContent=`${DATA.manifest.created_at||''} → ${DATA.manifest.updated_at||''} · ${DATA.raw_root}`;const totalTokens=allCalls().reduce((sum,call)=>sum+(call.usage?.total_tokens||0),0);const frames=allCalls().reduce((sum,call)=>sum+call.websocket_frames.length,0);const events=allCalls().reduce((sum,call)=>sum+call.sse_events.length,0);document.getElementById('kpis').innerHTML=[['Turns',DATA.turns.length],['Requests',allCalls().length],['SSE events',events],['WS frames',frames],['Tool calls',allCalls().reduce((sum,call)=>sum+call.function_calls.length,0)],['Tokens',fmtNum(totalTokens)]].map(([label,value])=>`<div class="kpi"><span>${label}</span><strong>${value}</strong></div>`).join('');renderChat();renderOutline()}
function renderChat(){document.getElementById('chatFlow').innerHTML=DATA.turns.map(turn=>`<section class="turn" id="${esc(turn.id)}"><div class="bubble-row user"><div class="bubble">${esc(turn.user)}</div></div><div class="assistant-head"><span class="avatar"><i data-lucide="bot"></i></span><strong>Recorded agent</strong><span>${turn.calls.length} requests</span></div><div class="turn-panel">${turn.calls.map(callCard).join('')}${turn.tool_outputs?.map(output=>`<pre class="tool-output"><strong>${esc(output.call_id)}</strong>\n${esc(output.output)}</pre>`).join('')||''}<div class="divider">assistant output</div><div class="answer">${esc(turn.assistant||'(no final text; request may contain only protocol or tool activity)')}</div></div></section>`).join('')}
function callCard(call){const usage=call.usage||{};const activity=call.protocol==='websocket'?`${call.websocket_frames.length} frames`:`${call.sse_events.length} SSE events`;return `<button class="call-card" data-call="${esc(call.request_id)}"><i data-lucide="${call.protocol==='websocket'?'radio':'message-square-code'}"></i><span class="call-main"><strong>#${esc(call.index)} · ${esc(call.model)} · ${esc(call.path)}</strong><span>${esc(call.request_id)} · ${call.input_count} prompt items · ${call.tools_count} tool definitions</span></span><span class="metrics"><span class="protocol ${esc(call.protocol)}">${esc(call.protocol)}</span><span>${fmtMs(call.duration_ms)}</span><span>${activity}</span><span>${fmtNum(usage.total_tokens)} tokens</span></span></button>${call.function_calls.map(tool=>`<button class="tool-row" data-call="${esc(call.request_id)}" data-tool="${esc(tool.call_id)}"><i data-lucide="terminal"></i><span><strong>${esc(tool.name)}</strong><span>${esc(tool.call_id)} · ${tool.result==null?'no recorded return':'return recorded'}</span></span><i data-lucide="chevron-right"></i></button>`).join('')}`}
function renderOutline(){document.getElementById('outline').innerHTML=DATA.turns.map((turn,index)=>`<button class="outline-item ${index===state.selectedTurn?'active':''}" data-outline="${index}"><strong>Turn ${index+1}</strong><br>${esc(turn.user)}</button>`).join('')}
function openDrawer(id,tab='timeline'){if(state.selectedCallId!==id){state.expandedPrompts.clear();state.toolDefinitionsView='formatted'}state.selectedCallId=id;state.tab=tab;renderDrawer();document.getElementById('drawer').classList.add('open');document.getElementById('backdrop').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('backdrop').classList.remove('open')}
function renderDrawer(){const call=callById(state.selectedCallId)||allCalls()[0];if(!call)return;document.getElementById('drawerTitle').textContent=`请求详情 · #${call.index}`;document.getElementById('drawerKind').textContent=call.protocol;const usage=call.usage||{};const fields=[['Protocol',call.protocol],['Status',call.status],['Request',`${call.method} ${call.path}`],['Started',call.started_at],['Completed',call.completed_at],['Latency',fmtMs(call.duration_ms)],['Request ID',call.request_id],['Model',call.model],['Total Tokens',fmtNum(usage.total_tokens)],['Request bytes',fmtNum(call.request_body_bytes)],['Response bytes',fmtNum(call.response_body_bytes)],['Recording',call.recording_state]];document.getElementById('basic').innerHTML=fields.map(([label,value])=>`<div class="field"><span>${label}</span><strong>${esc(value)}</strong></div>`).join('');const tabs=[['timeline',`Timeline ${call.timeline.length}`],['prompt',`Prompt ${call.prompt_blocks.length}`],['response','Response'],['sse',`SSE ${call.sse_events.length}`],['websocket',`WebSocket ${call.websocket_frames.length}`],['tools',`Tools ${call.function_calls.length}`],['metadata','Metadata'],['raw','Raw']];document.getElementById('tabs').innerHTML=tabs.map(([id,label])=>`<button class="tab ${state.tab===id?'active':''}" data-tab="${id}">${label}</button>`).join('');renderDrawerBody(call);iconize()}
function promptBlockHtml(block,index){const key=`${state.selectedCallId}:${index}`;const full=block.text||block.excerpt||'';const preview=block.excerpt||'';const expandable=full!==preview;const expanded=state.expandedPrompts.has(key);const roleClass={system:'role-system',developer:'role-developer',user:'role-user',assistant:'role-assistant'}[block.role]||'role-default';const toggle=expandable?`<button type="button" class="prompt-toggle" data-prompt-key="${esc(key)}" aria-expanded="${expanded}"><i data-lucide="${expanded?'chevron-up':'chevron-down'}"></i><span>${expanded?'收起':'展开全部'}</span></button>`:'';return `<section class="prompt-block ${roleClass}"><div class="prompt-head"><span>${esc(block.type)} · ${esc(block.role)}</span><code>${fmtNum(block.chars)} chars</code></div><pre class="code">${esc(expanded?full:preview)}</pre>${toggle}</section>`}
function toolDefinitionHtml(tool){return `<details class="tool-definition"><summary><i class="tool-chevron" data-lucide="chevron-right"></i><span class="tool-definition-main"><strong>${esc(tool.name)}</strong><span>${esc(tool.description||'No description')}</span></span><span class="tool-type">${esc(tool.type)}</span><i data-lucide="wrench"></i></summary><div class="tool-definition-body">${tool.description?`<p class="tool-definition-description">${esc(tool.description)}</p>`:''}<h4>Schema definition</h4><pre class="code">${syntaxJson(tool.definition)}</pre></div></details>`}
function toolDefinitionsHtml(definitions){const formatted=state.toolDefinitionsView==='formatted';const toggle=`<div class="tool-section-head"><strong>Tool Definitions (${definitions.length})</strong><span class="tool-view-toggle" aria-label="Tool definitions view"><button type="button" class="${formatted?'active':''}" data-tool-definitions-view="formatted" aria-pressed="${formatted}">格式化</button><button type="button" class="${formatted?'':'active'}" data-tool-definitions-view="raw" aria-pressed="${!formatted}">原始数据</button></span></div>`;if(!definitions.length)return toggle+'<div class="empty">No tool definitions in this request.</div>';return toggle+(formatted?definitions.map(toolDefinitionHtml).join(''):`<section class="detail-block"><pre class="code">${syntaxJson(definitions.map(tool=>tool.definition))}</pre></section>`)}
function renderDrawerBody(call){const element=document.getElementById('drawerBody');if(call.recording_warning)element.innerHTML=`<div class="warning">${esc(call.recording_warning)}</div>`;else element.innerHTML='';if(state.tab==='timeline'){element.innerHTML+=`<div class="timeline">${call.timeline.map(item=>`<div class="timeline-row"><strong>${esc(item.kind)}</strong><span>#${item.sequence} · ${esc(item.timestamp||'order only')}</span><span>${esc(item.summary)}</span></div>`).join('')}</div>`;return}if(state.tab==='prompt'){element.innerHTML+=call.prompt_blocks.map(promptBlockHtml).join('')||'<div class="empty">No prompt blocks.</div>';return}if(state.tab==='response'){element.innerHTML+=`<section class="detail-block"><div class="detail-head"><span>Derived output</span></div><pre class="code">${esc(call.output_text||'(no derived text output)')}</pre></section>${call.response_body?`<section class="detail-block"><div class="detail-head"><span>Raw buffered body · ${esc(call.response_body.encoding)}</span><span>${fmtNum(call.response_body.bytes)} bytes</span></div><pre class="code">${esc(call.response_body.content)}</pre></section>`:''}`;return}if(state.tab==='sse'){element.innerHTML+=call.sse_events.map(event=>`<details class="event-card"><summary>#${event.index} · ${esc(event.event_type)}</summary><div class="event-meta">event=${esc(event.event||'')} · id=${esc(event.id||'')} · retry=${esc(event.retry||'')}</div><pre class="code">${esc(event.raw)}</pre></details>`).join('')||'<div class="empty">No SSE events recorded for this request.</div>';return}if(state.tab==='websocket'){element.innerHTML+=call.websocket_frames.map(frame=>`<details class="frame-card"><summary>#${frame.index} · ${esc(frame.direction)} · ${esc(frame.opcode)}</summary><div class="event-meta">${esc(frame.timestamp)}</div><pre class="code">${esc(frame.text??frame.payload_base64??JSON.stringify(frame.close,null,2)??'')}</pre></details>`).join('')||'<div class="empty">No WebSocket frames recorded for this request.</div>';return}if(state.tab==='tools'){const emitted=call.function_calls.map(tool=>`<section class="detail-block"><div class="detail-head"><span>${esc(tool.name)} · ${esc(tool.call_id)}</span><span>${esc(tool.status)}</span></div><h4 style="padding:0 14px">Arguments</h4><pre class="code">${syntaxJson(tool.arguments)}</pre><h4 style="padding:0 14px">Return</h4><pre class="code">${esc(tool.result??'(return not present in selected recording)')}</pre></section>`).join('');element.innerHTML+=`<div class="tool-section-head"><strong>Tool Calls (${call.function_calls.length})</strong></div>`+(emitted||'<div class="empty">No tool call emitted by this request.</div>')+toolDefinitionsHtml(call.tool_definitions);return}if(state.tab==='metadata'){element.innerHTML+=`<pre class="code">${syntaxJson({request_meta:call.request_meta,response_meta:call.response_meta,websocket_meta:call.websocket_meta,event_counts:call.event_counts,usage:call.usage,visible_user_messages:call.visible_user_messages,previous_function_calls:call.previous_function_calls,previous_tool_outputs:call.previous_tool_outputs})}</pre>`;return}element.innerHTML+=`<section class="detail-block"><div class="detail-head"><span>Decoded request body</span></div><pre class="code">${syntaxJson(call.request_body)}</pre></section><div class="file-list">${call.files.map(file=>`<div class="file-row"><span>${esc(file.name)}</span><code>${fmtNum(file.bytes)} bytes</code></div>`).join('')}</div><pre class="code" style="margin-top:12px">${esc(call.raw_dir)}</pre>`}
function openTrimmer(){if(!DATA)return;state.lastPreview=null;document.getElementById('trimRequests').innerHTML=allCalls().map(call=>`<label class="request-choice"><input type="checkbox" data-trim-request="${esc(call.index)}" checked /><span><strong>源 #${esc(call.index)} · ${esc(call.method)} ${esc(call.path)}</strong><span>${esc(call.protocol)} · ${call.sse_events.length} SSE · ${call.websocket_frames.length} frames · ${call.tools_count} tools</span></span><code>${fmtNum(call.request_body_bytes+call.response_body_bytes)} B</code></label>`).join('');document.getElementById('selectAll').checked=true;document.getElementById('trimPreview').innerHTML='<div class="empty">选择序列和处理选项后生成预览。</div>';document.getElementById('trimModal').classList.add('open');document.getElementById('trimBackdrop').classList.add('open');iconize()}
function closeTrimmer(){document.getElementById('trimModal').classList.remove('open');document.getElementById('trimBackdrop').classList.remove('open')}
function collectTrimOptions(){const selected_requests=[...document.querySelectorAll('[data-trim-request]:checked')].map(input=>input.dataset.trimRequest);if(!selected_requests.length)throw new Error('至少保留一个请求 / 响应对');const remove={tools:false,skills:false,apps:false,plugins:false,derived_prompt:false};document.querySelectorAll('[data-remove]').forEach(input=>remove[input.dataset.remove]=input.checked);return{selected_requests,redact_sensitive_headers:document.getElementById('redactHeaders').checked,sensitive_values:document.getElementById('sensitiveValues').value.split('\n').map(value=>value.trim()).filter(Boolean),remove}}
async function previewTrim(){const options=collectTrimOptions();const preview=await api(`/api/profiles/${encodeURIComponent(DATA.profile)}/sessions/${encodeURIComponent(DATA.session_id)}/testset/preview`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(options)});state.lastPreview={options,preview};document.getElementById('trimPreview').innerHTML=`<div class="preview-summary"><div><span>保留</span><strong>${preview.selected_request_count}</strong></div><div><span>移除</span><strong>${preview.removed_request_count}</strong></div><div><span>敏感值</span><strong>${preview.sensitive_value_count}</strong></div></div><div class="detail-block"><div class="detail-head"><span>导出 user inputs</span></div><pre class="code">${syntaxJson(preview.user_inputs)}</pre></div>${preview.requests.map(item=>`<details class="preview-request"><summary>源 #${esc(item.source_index)} → 导出 #${esc(item.export_index)} · ${esc(item.protocol)} ${esc(item.path)}</summary><pre class="code">${syntaxJson(item.request_body)}</pre></details>`).join('')}`}
async function saveCurrentTestset(options,replace=false){const body={...options,replace};try{const saved=await api(`/api/profiles/${encodeURIComponent(DATA.profile)}/sessions/${encodeURIComponent(DATA.session_id)}/testset`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});alert(`已导出 ${saved.selected_requests} 个请求 / 响应对：\n${saved.testset_path}`);closeTrimmer()}catch(error){if(error.status===409&&error.body?.replace_required&&confirm(`测试集已存在，是否替换？\n\n${error.body.first_user_input}`))return saveCurrentTestset(options,true);throw error}}
document.addEventListener('click',event=>{const session=event.target.closest('[data-session]');if(session){loadSession(state.profile,session.dataset.session);return}const call=event.target.closest('[data-call]');if(call){openDrawer(call.dataset.call,call.dataset.tool?'tools':'timeline');return}const prompt=event.target.closest('[data-prompt-key]');if(prompt){const key=prompt.dataset.promptKey;state.expandedPrompts.has(key)?state.expandedPrompts.delete(key):state.expandedPrompts.add(key);renderDrawer();return}const definitionsView=event.target.closest('[data-tool-definitions-view]');if(definitionsView){state.toolDefinitionsView=definitionsView.dataset.toolDefinitionsView;renderDrawer();return}const tab=event.target.closest('[data-tab]');if(tab){state.tab=tab.dataset.tab;renderDrawer();return}const outline=event.target.closest('[data-outline]');if(outline){state.selectedTurn=Number(outline.dataset.outline);renderOutline();document.getElementById(DATA.turns[state.selectedTurn].id)?.scrollIntoView({behavior:'smooth',block:'start'})}});
document.getElementById('profileSelect').addEventListener('change',async event=>{state.profile=event.target.value;const sessions=await api(`/api/profiles/${encodeURIComponent(state.profile)}/sessions`);const session=sessions.sessions[0]?.session_id;renderSessionList(sessions.sessions,session);if(session)await loadSession(state.profile,session)});
document.getElementById('search').addEventListener('input',event=>{if(!DATA)return;const query=event.target.value.trim().toLowerCase();document.querySelectorAll('.turn').forEach((node,index)=>node.style.display=!query||JSON.stringify(DATA.turns[index]).toLowerCase().includes(query)?'':'none')});
document.getElementById('trimMode').addEventListener('click',openTrimmer);document.getElementById('saveTestset').addEventListener('click',openTrimmer);document.getElementById('closeDrawer').addEventListener('click',closeDrawer);document.getElementById('backdrop').addEventListener('click',closeDrawer);document.getElementById('closeTrim').addEventListener('click',closeTrimmer);document.getElementById('cancelTrim').addEventListener('click',closeTrimmer);document.getElementById('trimBackdrop').addEventListener('click',closeTrimmer);
document.getElementById('selectAll').addEventListener('change',event=>document.querySelectorAll('[data-trim-request]').forEach(input=>input.checked=event.target.checked));document.getElementById('previewTrim').addEventListener('click',()=>previewTrim().catch(error=>alert(error.message)));document.getElementById('exportTrim').addEventListener('click',async()=>{try{const options=collectTrimOptions();if(!state.lastPreview||JSON.stringify(state.lastPreview.options)!==JSON.stringify(options))await previewTrim();await saveCurrentTestset(options)}catch(error){alert(error.message)}});
boot();
</script>
</body>
</html>
