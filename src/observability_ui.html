<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bridle Recording Observability</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{color-scheme:dark;--bg:#14171d;--panel:#1b2028;--panel2:#222833;--ink:#e7eaf0;--muted:#9aa3b2;--faint:#697283;--line:#303846;--blue:#3b82f6;--green:#39d98a;--amber:#f0b84f;--code:#111720}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0}button,input,select{font:inherit}
.app{display:grid;grid-template-rows:58px minmax(0,1fr);height:100vh;overflow:hidden}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 18px;border-bottom:1px solid #252b35;background:#171b22}.brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{display:grid;place-items:center;width:30px;height:30px;border:1px solid #465165;border-radius:6px;background:#202631;color:#d7dde8}.brand strong{display:block;font-size:14px}.brand span{display:block;font-size:12px;color:var(--muted)}.logo svg,.btn svg,.icon-btn svg,.call-card svg,.tool-row svg{width:16px;height:16px}.search{position:relative;width:min(380px,34vw)}.search svg{position:absolute;left:10px;top:9px;color:var(--faint);width:16px;height:16px}.search input,.select{width:100%;height:34px;padding:0 12px 0 34px;border:1px solid var(--line);border-radius:8px;background:#11151b;color:var(--ink);outline:none}.top-actions{display:flex;align-items:center;gap:8px}.btn,.icon-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:34px;border:1px solid var(--line);border-radius:7px;background:#202632;color:var(--ink);cursor:pointer}.btn{padding:0 11px}.icon-btn{width:34px}.btn.primary{border-color:#2f69d9;background:#2563eb;color:#fff}.shell{display:grid;grid-template-columns:280px minmax(0,1fr) 246px;height:100%;min-height:0}.sidebar,.chat,.outline{min-height:0;overflow:auto}.sidebar{border-right:1px solid var(--line);background:#151920}.side-head,.outline-head{padding:14px;border-bottom:1px solid var(--line)}.side-head h1,.outline-head h2{margin:0;font-size:14px}.side-head p,.outline-head p{margin:4px 0 0;color:var(--muted);font-size:12px}.profile-select{padding:10px 14px;border-bottom:1px solid var(--line)}.profile-select select{width:100%;height:32px;border:1px solid var(--line);border-radius:8px;background:#11151b;color:var(--ink);padding:0 8px}.session-card{display:grid;gap:8px;margin:10px;padding:10px;border:1px solid #344255;border-radius:8px;background:#202733;text-align:left;color:inherit;cursor:pointer;width:calc(100% - 20px)}.session-card.active{border-color:#2f69d9;box-shadow:0 0 0 1px #2f69d9 inset}.session-card strong{font-size:13px;overflow-wrap:anywhere}.session-card span{font-size:12px;color:var(--muted);overflow-wrap:anywhere}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}.kpi{padding:10px;border:1px solid var(--line);border-radius:8px;background:#171d25}.kpi span{display:block;color:var(--muted);font-size:11px}.kpi strong{display:block;margin-top:5px;font-size:16px}.chat{background:radial-gradient(circle at top,rgba(59,130,246,.05),transparent 32%),#151920}.chat-inner{max-width:980px;margin:0 auto;padding:28px 28px 52px}.session-title{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px}.session-title h1{margin:0;font-size:18px}.session-title p{margin:5px 0 0;color:var(--muted)}.bubble-row{display:flex;margin:18px 0}.bubble-row.user{justify-content:flex-end}.avatar{display:grid;place-items:center;flex:0 0 auto;width:30px;height:30px;margin:2px 10px 0 0;border:1px solid var(--line);border-radius:50%;background:#222a36;color:#cbd5e1}.bubble{max-width:min(720px,82%);border:1px solid var(--line);border-radius:8px;background:#1b222d;padding:14px 16px;color:#dbe3ef;white-space:pre-wrap}.user .bubble{background:#1c2633;border-color:#33445c}.turn{margin:22px 0 34px}.assistant-head{display:flex;align-items:center;gap:9px;margin-bottom:9px;color:var(--muted)}.assistant-head strong{color:#dfe5ee}.tag{display:inline-flex;align-items:center;height:22px;padding:0 7px;border-radius:6px;background:#68451e;color:#ffd394;font-weight:700;font-size:12px}.turn-panel{border:1px solid var(--line);border-radius:8px;background:#1a2029;overflow:hidden}.call-card{width:100%;display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:10px;align-items:center;padding:11px 13px;border:0;border-bottom:1px solid var(--line);background:#202733;color:inherit;text-align:left;cursor:pointer}.call-card:hover,.tool-row:hover{background:#26303d}.call-main{min-width:0}.call-main strong{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.call-main span{display:block;margin-top:3px;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.metrics{display:flex;gap:10px;align-items:center;color:var(--muted);font-size:12px;white-space:nowrap}.answer{padding:18px 22px;white-space:pre-wrap;color:#dbe3ee;font-size:15px}.tool-row{width:calc(100% - 32px);display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:10px;align-items:center;margin:10px 16px;padding:10px 12px;border:1px solid #394456;border-radius:8px;background:#202733;color:inherit;text-align:left;cursor:pointer}.tool-row strong{display:block}.tool-row span{display:block;color:var(--muted);font-size:12px}.tool-output{margin:10px 16px 16px;padding:12px 14px;border:1px solid #2f4d38;border-radius:8px;background:#15271e;color:#ccebd8;font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre-wrap;overflow:auto}.divider{display:flex;align-items:center;gap:12px;margin:16px;color:var(--faint);font-size:12px}.divider:before,.divider:after{content:"";height:1px;background:var(--line);flex:1}.outline{border-left:1px solid var(--line);background:#151920}.outline-list{padding:10px}.outline-item{display:block;width:100%;padding:9px 10px;border:0;border-left:2px solid transparent;background:transparent;color:var(--muted);text-align:left;cursor:pointer}.outline-item.active{border-left-color:var(--green);background:#1d2430;color:#e7eaf0}.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;z-index:20}.drawer-backdrop.open{display:block}.drawer{position:fixed;right:0;top:0;width:min(60vw,1180px);min-width:760px;height:100vh;background:#242424;border-left:1px solid #3a3a3a;box-shadow:-24px 0 60px rgba(0,0,0,.35);display:grid;grid-template-rows:auto auto auto minmax(0,1fr);z-index:21;transform:translateX(100%);transition:transform .18s ease}.drawer.open{transform:translateX(0)}.drawer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;border-bottom:1px solid #3c3c3c}.drawer-title{display:flex;align-items:center;gap:12px}.drawer-title strong{font-size:16px}.drawer-actions{display:flex;gap:8px}.basic{display:grid;grid-template-columns:1fr 1fr;gap:10px 48px;padding:12px 18px;border-bottom:1px solid #3c3c3c}.field{display:grid;grid-template-columns:128px minmax(0,1fr);gap:10px;min-height:28px;align-items:center}.field span{color:#a6a6a6}.field strong{font-weight:500;overflow-wrap:anywhere}.tabs{display:flex;align-items:center;gap:18px;padding:0 18px;border-bottom:1px solid #3c3c3c}.tab{height:42px;border:0;border-bottom:2px solid transparent;background:transparent;color:#bdbdbd;cursor:pointer}.tab.active{border-bottom-color:var(--blue);color:#5aa0ff}.drawer-body{min-height:0;overflow:auto;padding:18px}.prompt-block{border:1px solid #314575;border-radius:8px;background:#222b49;margin-bottom:12px;overflow:hidden}.prompt-block.user{border-color:#23623b;background:#1d3526}.prompt-block.developer{border-color:#5a4a26;background:#342c1f}.prompt-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08)}.prompt-head span{display:inline-flex;align-items:center;gap:8px;color:#c9d2e2;font-weight:700}.prompt-head code{color:#aab6cc}.prompt-toggle{height:24px;border:1px solid #3b4658;border-radius:6px;background:#202733;color:#8ab4f8;cursor:pointer;font-size:12px;padding:0 8px}.code{margin:0;padding:13px 16px;background:var(--code);color:#d9e5f2;font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre-wrap;overflow:auto}.json-key{color:#8ab4f8}.json-string{color:#9cdcfe}.json-number{color:#b5cea8}.json-bool{color:#ce9178}.json-null{color:#8087a2}.tool-detail{border:1px solid #3b4658;border-radius:8px;background:#2a313d;margin-bottom:14px;overflow:hidden}.tool-detail h3{margin:0;padding:11px 14px;font-size:14px;border-bottom:1px solid #3b4658}.file-list{display:grid;gap:8px}.file-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 11px;border:1px solid #3b4658;border-radius:8px;background:#202733}.file-row span{color:#cbd5e1}.file-row code{color:#9aa3b2}.empty{padding:30px;color:var(--muted);text-align:center}.error{margin:20px;padding:14px;border:1px solid #6b2e2e;border-radius:8px;background:#2a1717;color:#ffd2d2}
@media(max-width:1100px){.shell{grid-template-columns:238px minmax(0,1fr)}.outline{display:none}.drawer{width:76vw;min-width:640px}}@media(max-width:760px){.app{height:auto;min-height:100vh;overflow:auto}.topbar{flex-wrap:wrap;height:auto;padding:12px}.search{order:3;width:100%}.shell{display:block}.sidebar{border-right:0;border-bottom:1px solid var(--line)}.chat-inner{padding:18px 12px 36px}.bubble{max-width:92%}.metrics{display:none}.drawer{width:100vw;min-width:0}.basic{grid-template-columns:1fr}.field{grid-template-columns:96px minmax(0,1fr)}} 
</style>
</head>
<body>
<div class="app">
<header class="topbar">
  <div class="brand"><div class="logo"><i data-lucide="bot"></i></div><div><strong>Bridle Recording</strong><span>Session Replay</span></div></div>
  <div class="search"><i data-lucide="search"></i><input id="search" placeholder="搜索 turn、tool、request id" /></div>
  <div class="top-actions"><a class="btn" href="/health"><i data-lucide="activity"></i><span>Health</span></a><button class="btn primary"><i data-lucide="scissors"></i><span>剪裁模式</span></button></div>
</header>
<div class="shell">
  <aside class="sidebar"><div class="side-head"><h1>会话</h1><p id="sessionMeta">loading</p></div><div class="profile-select"><select id="profileSelect"></select></div><div id="sessionList"></div><div class="kpis" id="kpis"></div></aside>
  <main class="chat"><div class="chat-inner"><section class="session-title"><div><h1 id="title">Loading</h1><p id="subtitle"></p></div><button class="btn" id="saveTestset"><i data-lucide="git-branch"></i><span>保存为测试集</span></button></section><div id="chatFlow"></div></div></main>
  <aside class="outline"><div class="outline-head"><h2>Turn Outline</h2><p>click to jump</p></div><div class="outline-list" id="outline"></div></aside>
</div>
</div>
<div class="drawer-backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head"><div class="drawer-title"><strong id="drawerTitle">LLMCall 详情</strong><span class="tag" id="drawerKind">call</span></div><div class="drawer-actions"><button class="btn"><i data-lucide="play-circle"></i><span>链路回放</span></button><button class="icon-btn" id="closeDrawer" title="关闭"><i data-lucide="x"></i></button></div></div>
  <div class="basic" id="basic"></div><div class="tabs" id="tabs"></div><div class="drawer-body" id="drawerBody"></div>
</aside>
<script>
let DATA=null;const state={profile:null,session:null,selectedTurn:0,selectedCallId:null,tab:'prompt',expandedPrompts:new Set()};
const qs=new URLSearchParams(location.hash.replace(/^#/,''));const syntaxJson=v=>esc(typeof v==='string'?v:JSON.stringify(v,null,2)).replace(/(&quot;(?:\\.|[^&])*?&quot;)(\s*:)?|\b(true|false)\b|\bnull\b|-?\b\d+(?:\.\d+)?(?:e[+-]?\d+)?\b/gi,(m,str,key,bool)=>str?`<span class="${key?'json-key':'json-string'}">${str}</span>${key||''}`:bool?`<span class="json-bool">${bool}</span>`:m==='null'?'<span class="json-null">null</span>':`<span class="json-number">${m}</span>`);const fmtMs=ms=>ms==null?'n/a':ms>=1000?(ms/1000).toFixed(2)+' s':ms+' ms';const fmtNum=n=>n==null?'0':Number(n).toLocaleString();const esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");const iconize=()=>window.lucide&&window.lucide.createIcons();const allCalls=()=>DATA?DATA.turns.flatMap(t=>t.calls):[];const callById=id=>allCalls().find(c=>c.request_id===id||c.index===id);
async function api(path){const res=await fetch(path);if(!res.ok)throw new Error(await res.text());return res.json()}
async function boot(){try{const profiles=await api('/api/profiles');const profile=qs.get('profile')||profiles.profiles[0];state.profile=profile;document.getElementById('profileSelect').innerHTML=profiles.profiles.map(p=>`<option ${p===profile?'selected':''}>${esc(p)}</option>`).join('');const sessions=await api(`/api/profiles/${encodeURIComponent(profile)}/sessions`);const session=qs.get('session')||(sessions.sessions[0]&&sessions.sessions[0].session_id);renderSessionList(sessions.sessions,session);if(session)await loadSession(profile,session);else showError('No recordings found for profile '+profile)}catch(e){showError(e.message)}iconize()}
async function loadSession(profile,session){state.profile=profile;state.session=session;setActiveSession(session);DATA=await api(`/api/profiles/${encodeURIComponent(profile)}/sessions/${encodeURIComponent(session)}`);location.hash=`profile=${encodeURIComponent(profile)}&session=${encodeURIComponent(session)}`;renderShell();iconize()}
async function saveCurrentTestset(replace=false){if(!DATA)return;const res=await fetch(`/api/profiles/${encodeURIComponent(DATA.profile)}/sessions/${encodeURIComponent(DATA.session_id)}/testset`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({replace})});const body=await res.json().catch(()=>({detail:'save failed'}));if(res.status===409&&body.replace_required){if(confirm(`测试集已存在，是否替换？\n\n${body.first_user_input}`))return saveCurrentTestset(true);return}if(!res.ok)throw new Error(body.detail||body.error||'save failed');alert(`已保存测试集：\n${body.testset_path}`)}

function showError(text){document.getElementById('chatFlow').innerHTML=`<div class="error">${esc(text)}</div>`}
function renderSessionList(sessions,active){document.getElementById('sessionMeta').textContent=`${state.profile||''} · ${sessions.length} sessions`;document.getElementById('sessionList').innerHTML=sessions.map(s=>`<button class="session-card ${s.session_id===active?'active':''}" data-session="${esc(s.session_id)}" ${s.session_id===active?'aria-current="true"':''}><strong>${esc(s.session_id)}</strong><span>${esc(s.updated_at||s.created_at)} · ${s.request_count} requests</span></button>`).join('')}
function setActiveSession(session){document.querySelectorAll('.session-card').forEach(card=>{const active=card.dataset.session===session;card.classList.toggle('active',active);if(active)card.setAttribute('aria-current','true');else card.removeAttribute('aria-current')})}
function renderShell(){document.getElementById('sessionMeta').textContent=`${DATA.profile} · ${DATA.manifest.request_count} requests`;document.getElementById('title').textContent=`${DATA.session_id.slice(0,8)} · Codex HTTP Session`;document.getElementById('subtitle').textContent=`${DATA.manifest.created_at} → ${DATA.manifest.updated_at} · ${DATA.raw_root}`;const totalTokens=allCalls().reduce((s,c)=>s+(c.usage?.total_tokens||0),0);const toolCalls=allCalls().reduce((s,c)=>s+(c.function_calls?.length||0),0);document.getElementById('kpis').innerHTML=[['Turns',DATA.turns.length],['LLM calls',allCalls().length],['Tool calls',toolCalls],['Tokens',fmtNum(totalTokens)]].map(x=>`<div class="kpi"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('');renderChat();renderOutline()}
function renderChat(){document.getElementById('chatFlow').innerHTML=DATA.turns.map((turn,ti)=>`<section class="turn" id="${esc(turn.id)}"><div class="bubble-row user"><div class="bubble">${esc(turn.user)}</div></div><div class="assistant-head"><span class="avatar"><i data-lucide="bot"></i></span><strong>Codex</strong><span class="tag">NFC</span><span>${turn.calls.length} LLM calls</span></div><div class="turn-panel">${turn.calls.map(c=>callCard(c)).join('')}${turn.tool_outputs?.map(o=>`<pre class="tool-output">${esc(o.output)}</pre>`).join('')||''}<div class="divider">assistant output</div><div class="answer">${esc(turn.assistant||'(no final text; model emitted tool call)')}</div></div></section>`).join('')}
function callCard(c){const u=c.usage||{};return `<button class="call-card" data-call="${esc(c.request_id)}"><i data-lucide="message-square-code"></i><span class="call-main"><strong>LLMCall #${esc(c.index)} · ${esc(c.model)} · ${esc(c.path)}</strong><span>${esc(c.request_id)} · ${c.input_count} prompt items · ${c.tools_count} tool definitions</span></span><span class="metrics"><span>${fmtMs(c.duration_ms)}</span><span>${fmtNum(u.total_tokens)} tokens</span><span>${c.function_calls.length} calls</span></span></button>${c.function_calls.map(t=>`<button class="tool-row" data-call="${esc(c.request_id)}" data-tool="${esc(t.call_id)}"><i data-lucide="terminal"></i><span><strong>${esc(t.name)}</strong><span>${esc(t.call_id)} · ${esc(t.status)}</span></span><i data-lucide="chevron-right"></i></button>`).join('')}`}
function renderOutline(){document.getElementById('outline').innerHTML=DATA.turns.map((t,i)=>`<button class="outline-item ${i===state.selectedTurn?'active':''}" data-outline="${i}"><strong>Turn ${i+1}</strong><br>${esc(t.user)}</button>`).join('')}
function openDrawer(id,tab='prompt'){if(state.selectedCallId!==id)state.expandedPrompts.clear();state.selectedCallId=id;state.tab=tab;renderDrawer();document.getElementById('drawer').classList.add('open');document.getElementById('backdrop').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('backdrop').classList.remove('open')}
function renderDrawer(){const c=callById(state.selectedCallId)||allCalls()[0];document.getElementById('drawerTitle').textContent=`LLMCall 详情 · #${c.index}`;document.getElementById('drawerKind').textContent=c.function_calls.length?'tool turn':'message';const u=c.usage||{};const fields=[['Model',c.model],['Status',c.status],['Request Type',`${c.method} ${c.path}`],['CreatedAt',c.started_at],['Latency',fmtMs(c.duration_ms)],['Response ID',c.request_id],['Input Tokens',fmtNum(u.input_tokens)],['Output Tokens',fmtNum(u.output_tokens)],['Total Tokens',fmtNum(u.total_tokens)],['Tool Calls',c.function_calls.length],['Prompt Items',c.input_count],['Tool Definitions',c.tools_count]];document.getElementById('basic').innerHTML=fields.map(([k,v])=>`<div class="field"><span>${k}</span><strong>${esc(v)}</strong></div>`).join('');const tabs=[['prompt','Prompt'],['response','Response'],['tools',`Tools ${c.function_calls.length}`],['metadata','Metadata'],['raw','Raw']];document.getElementById('tabs').innerHTML=tabs.map(([id,label])=>`<button class="tab ${state.tab===id?'active':''}" data-tab="${id}">${label}</button>`).join('');renderDrawerBody(c);iconize()}
function promptBlockHtml(b,i){const key=`${state.selectedCallId}:${i}`;const full=b.text||b.excerpt||'';const preview=b.excerpt||'';const expandable=full!==preview;const expanded=state.expandedPrompts.has(key);const shown=expanded?full:preview;return `<section class="prompt-block ${esc(b.type)}"><div class="prompt-head"><span>${esc(b.type)} · ${esc(b.role)}</span><span>${expandable?`<button class="prompt-toggle" data-prompt-key="${esc(key)}">${expanded?'收缩':'展开全部'}</button>`:''}<code>${fmtNum(b.chars)} chars</code></span></div><pre class="code">${esc(shown)}</pre></section>`}
function renderDrawerBody(c){const el=document.getElementById('drawerBody');if(state.tab==='prompt'){el.innerHTML=c.prompt_blocks.map(promptBlockHtml).join('');return}if(state.tab==='response'){el.innerHTML=`<pre class="code">${esc(c.output_text||'(tool call only; final text appears in a later LLMCall)')}</pre>`;return}if(state.tab==='tools'){const calls=c.function_calls.length?c.function_calls.map(t=>`<section class="tool-detail"><h3>${esc(t.name)} · ${esc(t.call_id)}</h3><pre class="code">${syntaxJson(t.arguments)}</pre></section>`).join(''):'<div class="empty">No tool call emitted by this LLMCall.</div>';el.innerHTML=calls+`<section class="tool-detail"><h3>Tool Definitions (${c.tool_definitions.length})</h3><pre class="code">${syntaxJson(c.tool_definitions)}</pre></section>`;return}if(state.tab==='metadata'){el.innerHTML=`<pre class="code">${syntaxJson({event_counts:c.event_counts,usage:c.usage,previous_function_calls:c.previous_function_calls,previous_tool_outputs:c.previous_tool_outputs,previous_assistant_messages:c.previous_assistant_messages})}</pre>`;return}el.innerHTML=`<div class="file-list">${c.files.map(f=>`<div class="file-row"><span>${esc(f.name)}</span><code>${fmtNum(f.bytes)} bytes</code></div>`).join('')}</div><pre class="code" style="margin-top:12px">${esc(c.raw_dir)}</pre>`}
document.addEventListener('click',e=>{const sess=e.target.closest('[data-session]');if(sess){loadSession(state.profile,sess.dataset.session);return}const call=e.target.closest('[data-call]');if(call){openDrawer(call.dataset.call,call.dataset.tool?'tools':'prompt');return}const promptToggle=e.target.closest('[data-prompt-key]');if(promptToggle){const key=promptToggle.dataset.promptKey;if(state.expandedPrompts.has(key))state.expandedPrompts.delete(key);else state.expandedPrompts.add(key);renderDrawer();return}const tab=e.target.closest('[data-tab]');if(tab){state.tab=tab.dataset.tab;renderDrawer();return}const outline=e.target.closest('[data-outline]');if(outline){state.selectedTurn=Number(outline.dataset.outline);renderOutline();document.getElementById(DATA.turns[state.selectedTurn].id)?.scrollIntoView({behavior:'smooth',block:'start'});return}});
document.getElementById('profileSelect').addEventListener('change',async e=>{state.profile=e.target.value;const sessions=await api(`/api/profiles/${encodeURIComponent(state.profile)}/sessions`);const session=sessions.sessions[0]&&sessions.sessions[0].session_id;renderSessionList(sessions.sessions,session);if(session)await loadSession(state.profile,session)});
document.getElementById('saveTestset').addEventListener('click',()=>saveCurrentTestset().catch(err=>alert(err.message)));document.getElementById('closeDrawer').addEventListener('click',closeDrawer);document.getElementById('backdrop').addEventListener('click',closeDrawer);document.getElementById('search').addEventListener('input',e=>{if(!DATA)return;const q=e.target.value.trim().toLowerCase();document.querySelectorAll('.turn').forEach((node,i)=>{node.style.display=!q||JSON.stringify(DATA.turns[i]).toLowerCase().includes(q)?'':'none'})});boot();
</script>
</body>
</html>
